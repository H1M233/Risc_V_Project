  <path d="M 900 289 C 1010 289, 1010 760, 310 760" class="signal-thin" stroke="#7d3fb5" marker-end="url(#arrow-purple)"/>

  <path d="M 252 909 L 1525 909 L 1525 454" class="signal" stroke="#d88a14" marker-end="url(#arrow-orange)"/>
  <path d="M 167 875 L 167 236 L 88 236" class="signal" stroke="#d88a14" marker-end="url(#arrow-orange)"/>
  <path d="M 167 875 L 167 516 L 314 516" class="signal" stroke="#d88a14" marker-end="url(#arrow-orange)"/>
