  <path d="M 1090 512 C 940 512, 960 230, 900 230" class="signal-thin" stroke="#2b8d4d" marker-end="url(#arrow-green)"/>
  <path d="M 1396 492 C 1260 428, 1018 228, 900 260" class="signal-thin" stroke="#2b8d4d" marker-end="url(#arrow-green)"/>

  <path d="M 900 434 L 900 434" class="signal" stroke="#c54848"/>
