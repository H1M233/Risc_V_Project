  <path d="M 167 875 L 167 735 L 85 735" class="signal-thin dashed" stroke="#d88a14" marker-end="url(#arrow-orange)"/>

  <text x="210" y="194" class="small">pc_addr_o -&gt; irom_addr</text>
  <text x="232" y="340" class="small">pc + inst pass-through</text>
  <text x="433" y="352" class="small">decode, imm, reg addr</text>
  <text x="531" y="480" class="small">rs1/rs2 read</text>
  <text x="774" y="352" class="small">ALU, branch, load/store</text>
  <text x="810" y="481" class="small">redirect on mispredict</text>
  <text x="1120" y="352" class="small">load data align / store mask</text>
  <text x="1477" y="478" class="small">commit to regs</text>

  <rect x="515" y="995" width="770" height="82" rx="20" fill="#ffffff" stroke="#ccd1d7" stroke-width="2" filter="drop-shadow(0 5px 10px rgba(0,0,0,0.08))"/>
  <text x="560" y="1026" class="legend">Legend</text>
  <line x1="648" y1="1021" x2="716" y2="1021" class="signal" stroke="#30353a" marker-end="url(#arrow-dark)"/>
  <text x="730" y="1026" class="legend">main datapath</text>
  <line x1="648" y1="1052" x2="716" y2="1052" class="signal-thin" stroke="#7d3fb5" marker-end="url(#arrow-purple)"/>
  <text x="730" y="1057" class="legend">prediction query/update</text>
  <line x1="945" y1="1021" x2="1013" y2="1021" class="signal-thin dashed" stroke="#c54848" marker-end="url(#arrow-red)"/>
  <text x="1027" y="1026" class="legend">flush / redirect</text>
  <line x1="945" y1="1052" x2="1013" y2="1052" class="signal-thin" stroke="#d88a14" marker-end="url(#arrow-orange)"/>
  <text x="1027" y="1057" class="legend">stall control</text>
  <line x1="1185" y1="1021" x2="1253" y2="1021" class="signal-thin" stroke="#2b8d4d" marker-end="url(#arrow-green)"/>
  <text x="1267" y="1026" class="legend">MEM/WB forwarding to EX</text>
</svg>
